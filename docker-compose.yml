services:
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - path: ./apps/api/.env
        required: false

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:8080"
    depends_on:
      - api
