# Tooling config only (not a packaged project). Dependencies live in requirements.txt.

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# E/F = pyflakes+pycodestyle, I = isort, UP = pyupgrade, B = bugbear
select = ["E", "F", "I", "UP", "B"]
# Korean user-facing guidance is intentionally kept as readable sentences.
# Formatting and correctness checks still run; only physical line length is ignored.
ignore = ["E501"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["app/tests"]
addopts = "-q"
